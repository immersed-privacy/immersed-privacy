# configs/models/gemini_3_flash.yaml — Gemini 3 Flash via Google GenAI API
#
# Gemini 3 Flash combines the reasoning power of Gemini 3 Pro with
# the speed and efficiency of the Flash line. Supports text, image,
# audio, and video inputs.
#
# Setup:
#   pip install google-genai
#   export GOOGLE_API_KEY="your-api-key"

backend_type: "google"
model_name: "gemini-3-flash-preview"
api_key_env: "GOOGLE_API_KEY"
max_tokens: 2048
temperature: 0.0

thinking:
  thinking_level: "low"
